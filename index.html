<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissor</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="main">
      <nav>
        <h2>Rock Paper Scissor</h2>
        <button>Win Ratio : <span>0</span></button>
      </nav>
      <main>
        <div id="rock">
          <p>🪨</p>
          <h4>Rock</h4>
        </div>
        <div id="paper">
          <p>📃</p>
          <h4>Paper</h4>
        </div>
        <div id="scissor">
          <p>✂️</p>
          <h4>Scissor</h4>
        </div>
      </main>
      <div class="score">
        <div id="you">
          <p>0</p>
          <p>You 🫵</p>
        </div>
        <div id="computer">
          <p>0</p>
          <p>Computer 💻</p>
        </div>
      </div>
      <div class="status">
        <p><span>0</span> Rounds</p>
        <p>Take your Chance!</p>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
